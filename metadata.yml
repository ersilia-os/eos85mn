Source: Local
Source Type: External
Task: Representation
Subtask: Featurization
Input:
  - Compound
Input Dimension: 1
Output:
  - Value
Output Dimension: 768
Output Consistency: Fixed
Interpretation: 768-dimensional molecule-level embedding from the FARM 
  contrastive BERT model, suitable as input features for downstream property 
  prediction. Individual dimensions are not chemically interpretable. Sequences 
  are truncated to 512 BERT subword tokens during encoding.
