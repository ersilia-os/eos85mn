Identifier: eos85mn
Slug: farm-representation
Status: In progress
Title: FARM functional group-aware molecular representations
Description: FARM is a molecular representation model that uses functional 
  group-aware tokenization, bridging the gap between SMILES and natural 
  language. FARM has been benchmarked on MoleculeNet (SOTA on most tasks) and 
  provides atom-level and molecule-level embeddings. This model returns 
  768-dimensional molecule-level embeddings from the contrastive FARM BERT 
  checkpoint.
Deployment:
